<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Surf Game</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #001428; font-family: 'Arial', sans-serif; }
    canvas { position: fixed; top: 0; left: 0; display: block; }
    #ui {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      color: white;
    }
    #error-display {
      position: fixed; top: 0; left: 0; right: 0;
      background: rgba(180,0,0,0.92); color: #fff;
      padding: 14px 18px; font-size: 13px; font-family: monospace;
      white-space: pre-wrap; z-index: 9999; display: none;
      border-bottom: 2px solid #ff4444;
    }
    #score-display {
      position: absolute; top: 20px; right: 24px;
      text-align: right;
    }
    #total-score {
      font-size: 42px; font-weight: 900;
      text-shadow: 0 2px 12px rgba(0,200,255,0.6);
      letter-spacing: 2px; color: #fff;
    }
    #wave-score-label {
      font-size: 13px; letter-spacing: 3px; text-transform: uppercase;
      color: rgba(255,255,255,0.5);
    }
    #trick-feed {
      position: absolute; top: 50%; right: 24px;
      transform: translateY(-50%);
      text-align: right;
    }
    .trick-entry {
      font-size: 20px; font-weight: 700;
      color: #00ffcc;
      text-shadow: 0 0 20px rgba(0,255,200,0.8);
      animation: trickFade 2.2s forwards;
      margin-bottom: 4px;
    }
    .trick-pts { font-size: 13px; color: rgba(255,255,255,0.7); }
    @keyframes trickFade {
      0%   { opacity: 0; transform: translateX(20px); }
      15%  { opacity: 1; transform: translateX(0); }
      70%  { opacity: 1; }
      100% { opacity: 0; }
    }
    #speed-bar-container {
      position: absolute; bottom: 40px; left: 24px;
      display: flex; align-items: center; gap: 10px;
    }
    #speed-label { font-size: 11px; letter-spacing: 2px; color: rgba(255,255,255,0.4); }
    #speed-bar { width: 120px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; }
    #speed-fill { height: 100%; width: 0%; background: linear-gradient(90deg,#00ccff,#00ffaa); border-radius: 2px; transition: width 0.1s; }
    #wave-state { position: absolute; bottom: 40px; right: 24px; font-size: 12px; letter-spacing: 3px; text-transform: uppercase; color: rgba(255,255,255,0.35); }
    #barrel-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(ellipse at center, transparent 40%, rgba(0,60,40,0.4) 100%); opacity: 0; transition: opacity 0.3s; }
    #barrel-timer { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 48px; font-weight: 900; color: #00ffaa; text-shadow: 0 0 40px rgba(0,255,150,1); opacity: 0; transition: opacity 0.3s; }
    #judge-panel { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); text-align: center; opacity: 0; transition: opacity 0.5s; }
    #judge-score { font-size: 96px; font-weight: 900; color: white; text-shadow: 0 0 60px rgba(255,200,0,0.8); line-height: 1; }
    #judge-label { font-size: 18px; letter-spacing: 6px; color: rgba(255,255,255,0.6); text-transform: uppercase; }
    #controls-hint { position: absolute; bottom: 70px; left: 50%; transform: translateX(-50%); text-align: center; font-size: 12px; color: rgba(255,255,255,0.35); letter-spacing: 2px; }
    #wipeout-msg { position: absolute; top: 40%; left: 50%; transform: translate(-50%,-50%); font-size: 52px; font-weight: 900; color: white; text-shadow: 0 0 40px rgba(255,100,0,0.8); opacity: 0; letter-spacing: 4px; transition: opacity 0.4s; }
    #camera-mode { position: absolute; top: 20px; left: 24px; font-size: 11px; letter-spacing: 3px; color: rgba(255,255,255,0.3); text-transform: uppercase; }
  </style>
</head>
<body>

  <!-- Error display — shows JS errors without devtools -->
  <div id="error-display"></div>

  <!-- UI overlay — sits on top of the canvas -->
  <div id="ui">
    <div id="camera-mode">FOLLOW CAM</div>
    <div id="score-display">
      <div id="wave-score-label">WAVE SCORE</div>
      <div id="total-score">0.0</div>
    </div>
    <div id="trick-feed"></div>
    <div id="speed-bar-container">
      <span id="speed-label">SPEED</span>
      <div id="speed-bar"><div id="speed-fill"></div></div>
    </div>
    <div id="wave-state">LINEUP</div>
    <div id="barrel-overlay"></div>
    <div id="barrel-timer"></div>
    <div id="judge-panel">
      <div id="judge-score">0.0</div>
      <div id="judge-label">Wave Score</div>
    </div>
    <div id="wipeout-msg">WIPEOUT</div>
    <div id="controls-hint">
      A/D — Ride wave &nbsp;|&nbsp; W/S — Up/Down face &nbsp;|&nbsp; SPACE — Aerial &nbsp;|&nbsp; Q/E — Spin &nbsp;|&nbsp; F — Grab &nbsp;|&nbsp; C — Camera
    </div>
  </div>

  <script>
    // Show errors on screen (no devtools needed)
    function showError(msg) {
      var el = document.getElementById('error-display');
      if (el) { el.style.display = 'block'; el.textContent = msg; }
      console.error(msg);
    }
    window.onerror = function(msg, src, line) {
      showError('ERROR: ' + msg + '\n' + (src||'') + ' line ' + line);
    };
    window.addEventListener('unhandledrejection', function(e) {
      showError('MODULE ERROR: ' + (e.reason && e.reason.message ? e.reason.message : String(e.reason)));
    });
  </script>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="src/main.js"></script>
</body>
</html>
